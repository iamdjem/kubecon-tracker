<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Setup Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:      #0c0c0c;
  --s1:      #121212;
  --s2:      #181818;
  --s3:      #1f1f1f;
  --s4:      #272727;
  --line:    #1f1f1f;
  --line2:   #2a2a2a;
  --t1:      #e8e8e8;
  --t2:      #666666;
  --t3:      #333333;
  --accent:  #d4a843;
  --green:   #3d9970;
  --red:     #c0392b;
}

html, body { background: var(--bg); height: 100%; }
body {
  color: var(--t1);
  font-family: 'Space Grotesk', -apple-system, sans-serif;
  font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 88px;
}

/* ── HEADER ── */
.hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 18px 14px;
  border-bottom: 1px solid var(--line);
}
.hd-left {}
.hd-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; color: var(--t1); }
.hd-sub   { font-size: 11px; color: var(--t3); margin-top: 1px; font-weight: 400; }
.hd-right { display: flex; align-items: center; gap: 10px; }

.stat {
  text-align: right;
}
.stat-num  { font-size: 22px; font-weight: 700; letter-spacing: -1px; color: var(--t1); line-height: 1; }
.stat-lbl  { font-size: 10px; color: var(--t3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

.gear-btn {
  width: 34px; height: 34px;
  background: var(--s2);
  border: 1px solid var(--line2);
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--t2); transition: background 0.12s, color 0.12s;
  flex-shrink: 0;
}
.gear-btn:active { background: var(--s3); color: var(--t1); }
.gear-btn svg { width: 15px; height: 15px; }

/* ── FILTER BAR ── */
.filter-bar {
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-row { display: flex; gap: 6px; width: max-content; }

.fc {
  font-size: 12px; font-weight: 500;
  padding: 4px 11px;
  border: 1px solid var(--line2);
  border-radius: 3px;
  color: var(--t2);
  background: transparent;
  cursor: pointer; user-select: none;
  transition: all 0.12s;
  white-space: nowrap;
}
.fc:active { transform: scale(0.95); }
.fc.on {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

/* ── FILTER NOTICE ── */
.f-notice {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 18px;
  border-bottom: 1px solid var(--line);
  font-size: 12px; color: var(--t2);
}
.f-notice strong { color: var(--t1); font-weight: 600; }
.f-clear { font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500; }

/* ── TOP BAR ── */
.top-bar {
  display: flex; justify-content: flex-end;
  padding: 8px 18px 4px;
}
.rst-btn {
  font-family: inherit; font-size: 11px; font-weight: 500;
  color: var(--t3); background: none;
  border: 1px solid var(--line2); border-radius: 3px;
  padding: 4px 10px; cursor: pointer; transition: all 0.12s;
}
.rst-btn:active { color: var(--red); border-color: var(--red); }

/* ── SECTION ── */
.section { border-bottom: 1px solid var(--line); }
.sec-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px 6px;
}
.sec-name { font-size: 16px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px; }
.sec-count { font-size: 11px; color: var(--t2); }

/* ── ROOM ROW ── */
.room {
  display: flex; align-items: center;
  padding: 10px 18px;
  border-top: 1px solid var(--line);
  gap: 12px;
  transition: background 0.1s;
}
.room.done { opacity: 0.55; }
.room-name {
  font-size: 13px; font-weight: 500; color: var(--t2);
  flex: 0 0 108px; letter-spacing: -0.1px;
}
.steps-wrap { display: flex; gap: 5px; flex: 1; }
.step { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; max-width: 48px; }
.step input { display: none; }
.step-box {
  width: 100%; aspect-ratio: 1; max-width: 40px;
  border: 1px solid var(--line2);
  border-radius: 4px;
  background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.12s;
  font-size: 15px;
  position: relative;
}
.step-box:active { transform: scale(0.87); }
.step-icon { opacity: 0.15; line-height: 1; transition: opacity 0.12s; }
.step input:checked + .step-box { background: var(--s3); border-color: var(--green); }
.step input:checked + .step-box .step-icon { opacity: 1; }
.step-txt {
  font-size: 8px; font-weight: 500; color: var(--t3);
  letter-spacing: 0.2px; text-align: center; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40px;
}
.step input:checked ~ .step-txt { color: var(--green); }

.room-tag {
  flex-shrink: 0;
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 2px;
  letter-spacing: 0.3px; text-transform: uppercase;
}
.room-tag.done  { background: rgba(61,153,112,0.12); color: var(--green); }
.room-tag.wip   { background: rgba(212,168,67,0.10); color: var(--accent); }
.room-tag.empty { color: var(--t3); }

/* ── FOOTER ── */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 1px solid var(--line);
}
.wa-btn {
  width: 100%;
  background: #25D366; color: #000;
  font-family: inherit; font-size: 14px; font-weight: 700;
  border: none; border-radius: 4px; padding: 13px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; transition: opacity 0.12s;
}
.wa-btn:active { opacity: 0.8; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 76px;
  left: 50%; transform: translateX(-50%) translateY(6px);
  background: var(--s3); border: 1px solid var(--line2);
  color: var(--t1); font-size: 12px; font-weight: 500;
  padding: 8px 16px; border-radius: 3px;
  opacity: 0; pointer-events: none;
  transition: all 0.18s; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ════════════════════════════
   SETTINGS SHEET
════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border-top: 1px solid var(--line2);
  z-index: 101;
  max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.32,0,.15,1);
  padding-bottom: env(safe-area-inset-bottom);
}
.sheet.open { transform: translateY(0); }

.sh-handle { width: 32px; height: 3px; background: var(--line2); border-radius: 99px; margin: 10px auto 0; flex-shrink: 0; }
.sh-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0;
}
.sh-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.sh-close {
  width: 26px; height: 26px; background: var(--s3); border: none; border-radius: 3px;
  color: var(--t2); cursor: pointer; font-family: inherit; font-size: 13px;
  display: flex; align-items: center; justify-content: center; transition: background 0.12s;
}
.sh-close:active { background: var(--s4); }

.sh-body { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; padding: 16px 18px 24px; }

.sg { margin-bottom: 20px; }
.sg-lbl {
  font-size: 10px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px; padding-left: 2px;
}

.si {
  width: 100%; background: var(--s2); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--t1);
  font-family: inherit; font-size: 14px; font-weight: 500;
  padding: 10px 12px; outline: none; transition: border-color 0.12s;
  margin-bottom: 6px;
}
.si:focus { border-color: var(--accent); }
.si::placeholder { color: var(--t3); }
.si:last-child { margin-bottom: 0; }

/* Steps list */
.step-row-s {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 0; border-top: 1px solid var(--line);
}
.step-row-s:first-child { border-top: none; }
.si-icon {
  width: 42px; background: var(--s2); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--t1);
  font-family: inherit; font-size: 16px;
  padding: 8px 6px; outline: none; text-align: center;
  flex-shrink: 0;
}
.si-icon:focus { border-color: var(--accent); }
.si-name {
  flex: 1; background: transparent; border: none;
  color: var(--t2); font-family: inherit; font-size: 13px;
  outline: none; padding: 0;
}
.si-name:focus { color: var(--t1); }

/* Crew list */
.crew-item {
  background: var(--s2); border: 1px solid var(--line);
  border-radius: 4px; margin-bottom: 6px; overflow: hidden;
}
.ci-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; cursor: pointer;
}
.ci-arrow { color: var(--t3); font-size: 9px; margin-left: auto; flex-shrink: 0; transition: transform 0.18s; }
.crew-item.exp .ci-arrow { transform: rotate(90deg); }
.ci-name {
  flex: 1; background: transparent; border: none;
  color: var(--t1); font-family: inherit; font-size: 13px; font-weight: 600;
  outline: none; padding: 0;
}

.crew-rooms { padding: 0 12px 8px; display: none; }
.crew-item.exp .crew-rooms { display: block; }
.room-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-top: 1px solid var(--line);
}
.rn-input {
  flex: 1; background: transparent; border: none;
  color: var(--t2); font-family: inherit; font-size: 12px;
  outline: none; padding: 0;
}
.rn-input:focus { color: var(--t1); }

.del-btn {
  width: 22px; height: 22px; background: none; border: none;
  color: var(--t3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px; transition: all 0.12s; flex-shrink: 0;
}
.del-btn:active { color: var(--red); background: rgba(192,57,43,0.08); }
.del-btn svg { width: 13px; height: 13px; }

.add-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px dashed var(--line2);
  border-radius: 4px; color: var(--t3);
  font-family: inherit; font-size: 11px; font-weight: 500;
  padding: 7px 10px; cursor: pointer; width: 100%; margin-top: 6px;
  transition: all 0.12s;
}
.add-btn:active { border-color: var(--t2); color: var(--t2); }
.add-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

.add-crew-btn {
  width: 100%; padding: 10px;
  background: var(--s2); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--t2);
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.12s; margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.add-crew-btn:active { background: var(--s3); color: var(--t1); }

/* Firebase */
.fb-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.fb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--t3); flex-shrink: 0; }
.fb-dot.ok { background: var(--green); }
.fb-txt { font-size: 11px; color: var(--t3); }

.save-btn {
  width: 100%; padding: 12px;
  background: var(--accent); color: #000;
  font-family: inherit; font-size: 14px; font-weight: 700;
  border: none; border-radius: 4px; cursor: pointer;
  margin-top: 16px; transition: opacity 0.12s;
}
.save-btn:active { opacity: 0.8; }
</style>
</head>
<body>

<div class="hd">
  <div class="hd-left">
    <div class="hd-title" id="confTitle">Setup Tracker</div>
    <div class="hd-sub" id="confSub">—</div>
  </div>
  <div class="hd-right">
    <div class="stat">
      <div class="stat-num" id="statNum">0/0</div>
      <div class="stat-lbl">Rooms Done</div>
    </div>
    <div class="gear-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-row" id="filterRow"></div>
</div>

<div class="top-bar">
  <button class="rst-btn" onclick="confirmReset()">Reset all</button>
</div>

<div id="tracker"></div>

<div class="footer">
  <button class="wa-btn" onclick="copyStatus()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l5.1-1.35C8.5 21.52 10.22 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.67 0-3.22-.46-4.55-1.26l-.32-.19-3.02.8.81-2.96-.21-.34A7.944 7.944 0 014 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/></svg>
    Copy for WhatsApp
  </button>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay" onclick="closeSettings()"></div>
<div class="sheet" id="sheet">
  <div class="sh-handle"></div>
  <div class="sh-hd">
    <div class="sh-title">Settings</div>
    <button class="sh-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="sh-body" id="shBody"></div>
</div>

<script>
const DEFAULT_CONFIG = {
  title: 'Setup Tracker',
  subtitle: 'KubeCon EU 2026 · RAI Amsterdam',
  firebaseUrl: 'https://kubecon-tracker-default-rtdb.europe-west1.firebasedatabase.app',
  steps: [
    { key:'setup',  icon:'🔧', label:'Setup'  },
    { key:'ptz',    icon:'🤖', label:'PTZ'    },
    { key:'stream', icon:'🔑', label:'Keys'   },
    { key:'parsec', icon:'⚡', label:'Parsec' },
    { key:'tested', icon:'📝', label:'Tested' },
  ],
  crew: [
    { id:'alexi',   name:'Alexi',   rooms:[{id:'r1',name:'E103-105'},{id:'r2',name:'E106-108'},{id:'r3',name:'Auditorium'}] },
    { id:'clayton', name:'Clayton', rooms:[{id:'r4',name:'Hall 7A'},{id:'r5',name:'Hall 7B'},{id:'r6',name:'Hall 7C'}] },
    { id:'will',    name:'Will',    rooms:[{id:'r7',name:'Hall 8D'},{id:'r8',name:'Hall 8E'},{id:'r9',name:'Hall 8F'}] },
    { id:'costmo',  name:'Costmo',  rooms:[{id:'r10',name:'Hall 8G'},{id:'r11',name:'Hall 12'},{id:'r12',name:'Forum'}] },
    { id:'johnick', name:'Johnick', rooms:[{id:'r14',name:'Emerald Room'},{id:'r15',name:'G102-103'},{id:'r21',name:'G104-105'}] },
    { id:'brent',   name:'Brent',   rooms:[{id:'r16',name:'F002-005'},{id:'r17',name:'Amtrium 1+2'},{id:'r18',name:'CN Theater'}] },
    { id:'lynda',   name:'Lynda',   rooms:[{id:'r19',name:'Elicium 1'},{id:'r20',name:'Elicium 2'}] },
  ]
};

const PREFILL = {
  // Alexi
  r1:{setup:1,ptz:1,stream:1,parsec:1,tested:1}, // E103-105 ✅
  r2:{setup:1,ptz:1,stream:1,parsec:1,tested:1}, // E106-108 ✅
  r3:{setup:1,ptz:1,stream:0,parsec:0,tested:0}, // Auditorium 🛠️🤖
  // Clayton
  r4:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // Hall 7A 🛠️
  r5:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // Hall 7B 🛠️
  r6:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // Hall 7C 🛠️
  // Will
  r7:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // Hall 8D 🛠️
  r8:{setup:1,ptz:1,stream:0,parsec:0,tested:0}, // Hall 8E 🛠️🤖
  r9:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // Hall 8F 🛠️
  // Costmo
  r10:{setup:1,ptz:0,stream:0,parsec:1,tested:0}, // Hall 8G 🛠️⚡
  r11:{setup:0,ptz:0,stream:0,parsec:0,tested:0}, // Hall 12 —
  r12:{setup:1,ptz:1,stream:1,parsec:1,tested:1}, // Forum ✅
  // Johnick
  r14:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // Emerald Room 🛠️
  r15:{setup:1,ptz:1,stream:0,parsec:0,tested:0}, // G102-103 🛠️🤖
  r21:{setup:1,ptz:1,stream:0,parsec:0,tested:0}, // G104-105 🛠️🤖
  // Brent
  r16:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // F002-005 🛠️
  r17:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // Amtrium 1+2 🛠️
  r18:{setup:0,ptz:0,stream:0,parsec:0,tested:0}, // CN Theater —
  // Lynda
  r19:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // Elicium 1 🛠️
  r20:{setup:1,ptz:0,stream:0,parsec:0,tested:0}, // Elicium 2 🛠️
};

let config = JSON.parse(localStorage.getItem('kc_config')||'null') || DEFAULT_CONFIG;
let state  = JSON.parse(localStorage.getItem('kc_state') ||'{}');
let filter = null;
let fbDb   = null;

function saveConfig() { localStorage.setItem('kc_config', JSON.stringify(config)); }
function saveState()  { localStorage.setItem('kc_state',  JSON.stringify(state)); }
function getVal(rid, sk) {
  if (state[rid]?.[sk] !== undefined) return state[rid][sk];
  return PREFILL[rid]?.[sk] || 0;
}
function isDone(rid)   { return config.steps.every(s => getVal(rid, s.key)); }
function countDone(rid){ return config.steps.filter(s => getVal(rid, s.key)).length; }

function toggle(rid, sk) {
  if (!state[rid]) { state[rid]={}; config.steps.forEach(s => state[rid][s.key]=getVal(rid,s.key)); }
  state[rid][sk] ^= 1;
  saveState();
  if (fbDb) fbDb.child('state/'+rid).set(state[rid]);
  render();
}

// Firebase
function initFirebase(url) {
  if (!url) return;
  const load = (src, cb) => { const s=document.createElement('script'); s.src=src; s.onload=cb; document.head.appendChild(s); };
  load('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js', () =>
    load('https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js', () => {
      try {
        const app = firebase.initializeApp({ databaseURL: url }, 'tr');
        fbDb = firebase.database(app).ref('tracker');
        fbDb.child('state').on('value', s => { const v=s.val(); if(v){state=v;saveState();render();} });
        fbDb.child('config').on('value', s => { const v=s.val(); if(v&&v.steps&&v.crew){config=v;saveConfig();render();} });
        setFbStatus(true);
      } catch(e) { setFbStatus(false); }
    }));
}
function setFbStatus(ok) {
  const d=document.getElementById('fbDot'), t=document.getElementById('fbTxt');
  if(!d) return;
  d.className='fb-dot'+(ok?' ok':'');
  t.textContent=ok?'Connected — live sync active':'Not connected — local only';
}

// Render
function render() {
  document.getElementById('confTitle').textContent = config.title;
  document.getElementById('confSub').textContent   = config.subtitle;

  // Chips
  document.getElementById('filterRow').innerHTML = config.crew.map(c =>
    `<div class="fc${filter===c.id?' on':''}" onclick="toggleFilter('${c.id}')">${c.name}</div>`
  ).join('');

  const el = document.getElementById('tracker');
  el.innerHTML = '';

  if (filter) {
    const crew = config.crew.find(c=>c.id===filter);
    const n = document.createElement('div'); n.className='f-notice';
    n.innerHTML=`<span>Showing <strong>${crew?.name}</strong></span><span class="f-clear" onclick="toggleFilter('${filter}')">Show all</span>`;
    el.appendChild(n);
  }

  let total=0, done=0;

  config.crew.forEach((c,ci) => {
    if (filter && filter!==c.id) return;
    const cd = c.rooms.filter(r=>isDone(r.id)).length;
    total += c.rooms.length; done += cd;

    const sec = document.createElement('div'); sec.className='section';
    sec.innerHTML=`<div class="sec-hd"><span class="sec-name">${c.name}</span><span class="sec-count">${cd}/${c.rooms.length}</span></div>`;

    c.rooms.forEach(room => {
      const d=isDone(room.id), n=countDone(room.id);
      const tag = d?'done':n>0?'wip':'empty';
      const tagTxt = d?'Done':n>0?`${n}/${config.steps.length}`:'—';
      const row = document.createElement('div'); row.className=`room${d?' done':''}`;
      row.innerHTML=`
        <div class="room-name">${room.name}</div>
        <div class="steps-wrap">
          ${config.steps.map(s=>{
            const checked=getVal(room.id,s.key), id=`${room.id}_${s.key}`;
            return `<div class="step">
              <input type="checkbox" id="${id}" ${checked?'checked':''} onchange="toggle('${room.id}','${s.key}')">
              <label class="step-box" for="${id}"><span class="step-icon">${s.icon}</span></label>
              <span class="step-txt">${s.label}</span>
            </div>`;
          }).join('')}
        </div>
        <div class="room-tag ${tag}">${tagTxt}</div>`;
      sec.appendChild(row);
    });
    el.appendChild(sec);
  });

  document.getElementById('statNum').textContent = `${done}/${total}`;
}

function toggleFilter(id) { filter=filter===id?null:id; render(); }

function confirmReset() {
  if (!confirm('Reset all progress?')) return;
  state={}; saveState();
  if (fbDb) fbDb.child('state').set({});
  showToast('Progress reset'); render();
}

function copyStatus() {
  const lines=['SET UP MASTER LIST:'];
  config.crew.forEach(c => c.rooms.forEach(room => {
    const checks=config.steps.filter(s=>getVal(room.id,s.key)).map(s=>s.icon).join('');
    lines.push(`${room.name}-${c.name}${checks?' '+checks:''}`);
  }));
  lines.push('');
  lines.push(config.steps.map(s=>`${s.icon} = ${s.label}`).join('  '));
  navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('Copied')).catch(()=>prompt('Copy:',lines.join('\n')));
}

// Settings
function openSettings() {
  renderSettings();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSettings() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow='';
}

function renderSettings() {
  const body=document.getElementById('shBody');
  const stepsHtml = `<div>${config.steps.map((s,si)=>`
    <div class="step-row-s">
      <input class="si-icon" value="${s.icon}" onchange="updateStep(${si},'icon',this.value)" maxlength="2">
      <input class="si-name" value="${s.label}" onchange="updateStep(${si},'label',this.value)" placeholder="Step name">
      <div class="del-btn" onclick="deleteStep(${si})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>`).join('')}</div>`;

  const crewHtml = config.crew.map((c,ci)=>`
    <div class="crew-item" id="ci_${ci}">
      <div class="ci-hd" onclick="toggleExp(${ci})">
        <input class="ci-name" value="${c.name}" onclick="event.stopPropagation()" onchange="renameCrew(${ci},this.value)">
        <div class="del-btn" onclick="event.stopPropagation();delCrew(${ci})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </div>
        <div class="ci-arrow">▶</div>
      </div>
      <div class="crew-rooms">
        ${c.rooms.map((r,ri)=>`
          <div class="room-row">
            <input class="rn-input" value="${r.name}" onchange="renameRoom(${ci},${ri},this.value)">
            <div class="del-btn" onclick="delRoom(${ci},${ri})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
          </div>`).join('')}
        <button class="add-btn" onclick="addRoom(${ci})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add room
        </button>
      </div>
    </div>`).join('');

  body.innerHTML=`
    <div class="sg">
      <div class="sg-lbl">Conference</div>
      <input class="si" id="s_title" value="${config.title}" placeholder="Name">
      <input class="si" id="s_sub" value="${config.subtitle}" placeholder="Location / date">
    </div>
    <div class="sg">
      <div class="sg-lbl">Live Sync</div>
      <input class="si" id="s_fb" value="${config.firebaseUrl||''}" placeholder="Firebase Realtime DB URL" style="margin-bottom:0">
      <div class="fb-row"><div class="fb-dot${fbDb?' ok':''}" id="fbDot"></div><span class="fb-txt" id="fbTxt">${fbDb?'Connected — live sync active':'Not connected — local only'}</span></div>
    </div>
    <div class="sg">
      <div class="sg-lbl">Steps</div>
      ${stepsHtml}
      <button class="add-btn" onclick="addStep()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add step
      </button>
    </div>
    <div class="sg">
      <div class="sg-lbl">Crew & Rooms</div>
      ${crewHtml}
      <button class="add-crew-btn" onclick="addCrew()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add crew member
      </button>
    </div>
    <button class="save-btn" onclick="saveSettings()">Save & Apply</button>
    <div style="height:8px"></div>`;
}

function toggleExp(ci) { document.getElementById('ci_'+ci)?.classList.toggle('exp'); }
function renameCrew(ci,v){ config.crew[ci].name=v.trim()||config.crew[ci].name; }
function renameRoom(ci,ri,v){ config.crew[ci].rooms[ri].name=v.trim()||config.crew[ci].rooms[ri].name; }
function delCrew(ci){ if(!confirm(`Remove ${config.crew[ci].name}?`))return; config.crew.splice(ci,1); renderSettings(); }
function delRoom(ci,ri){ config.crew[ci].rooms.splice(ri,1); renderSettings(); }
function addRoom(ci){ config.crew[ci].rooms.push({id:'r_'+Date.now(),name:'New Room'}); renderSettings(); setTimeout(()=>document.getElementById('ci_'+ci)?.classList.add('exp'),10); }
function addCrew(){ config.crew.push({id:'c_'+Date.now(),name:'New Person',rooms:[]}); renderSettings(); }
function updateStep(si,f,v){ config.steps[si][f]=v.trim()||config.steps[si][f]; }
function deleteStep(si){ if(config.steps.length<=1){showToast('Need at least one step');return;} config.steps.splice(si,1); renderSettings(); }
function addStep(){ config.steps.push({key:'s_'+Date.now(),icon:'⭐',label:'New Step'}); renderSettings(); }

function saveSettings() {
  config.title    = document.getElementById('s_title').value.trim()||config.title;
  config.subtitle = document.getElementById('s_sub').value.trim()||config.subtitle;
  const fbUrl     = document.getElementById('s_fb').value.trim();
  if (fbUrl && fbUrl!==config.firebaseUrl) { config.firebaseUrl=fbUrl; initFirebase(fbUrl); }
  config.firebaseUrl = fbUrl;
  config.steps = config.steps.map(s=>({...s, key:s.key||'s_'+Date.now()}));
  saveConfig();
  if (fbDb) fbDb.child('config').set(config);
  render(); closeSettings(); showToast('Saved');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

if (config.firebaseUrl) initFirebase(config.firebaseUrl);
render();
</script>
</body>
</html>
