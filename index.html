<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Setup Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0c0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:      #0c0c0c;
  --s1:      #121212;
  --s2:      #181818;
  --s3:      #1f1f1f;
  --s4:      #272727;
  --line:    #1f1f1f;
  --line2:   #2a2a2a;
  --t1:      #e8e8e8;
  --t2:      #666666;
  --t3:      #333333;
  --accent:  #d4a843;
  --green:   #3d9970;
  --red:     #c0392b;
}

html, body { background: var(--bg); height: 100%; }
body {
  color: var(--t1);
  font-family: 'Space Grotesk', -apple-system, sans-serif;
  font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 20px;
}

/* ── HEADER ── */
.hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 18px 14px;
  border-bottom: 1px solid var(--line);
}
.hd-left {}
.hd-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; color: var(--t1); }
.hd-sub   { font-size: 11px; color: var(--t3); margin-top: 1px; font-weight: 400; }
.hd-right { display: flex; align-items: center; gap: 10px; }

.stat {
  text-align: right;
}
.stat-num  { font-size: 22px; font-weight: 700; letter-spacing: -1px; color: var(--t1); line-height: 1; }
.stat-lbl  { font-size: 10px; color: var(--t3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

.gear-btn {
  width: 34px; height: 34px;
  background: var(--s2);
  border: 1px solid var(--line2);
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--t2); transition: background 0.12s, color 0.12s;
  flex-shrink: 0;
}
.gear-btn:active { background: var(--s3); color: var(--t1); }
.gear-btn svg { width: 15px; height: 15px; }

/* ── FILTER BAR ── */
.filter-bar {
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-row { display: flex; gap: 6px; align-items: center; width: max-content; }

.fc {
  font-size: 12px; font-weight: 500;
  padding: 4px 11px;
  border: 1px solid var(--line2);
  border-radius: 3px;
  color: var(--t2);
  background: transparent;
  cursor: pointer; user-select: none;
  transition: all 0.12s;
  white-space: nowrap;
}
.fc:active { transform: scale(0.95); }
.fc.on {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

/* ── FILTER NOTICE ── */
.f-notice {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 18px;
  border-bottom: 1px solid var(--line);
  font-size: 12px; color: var(--t2);
}
.f-notice strong { color: var(--t1); font-weight: 600; }
.f-clear { font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500; }

/* ── TOP BAR ── */
.top-bar {
  display: flex; justify-content: flex-end;
  padding: 8px 18px 4px;
}
.rst-btn {
  font-family: inherit; font-size: 11px; font-weight: 500;
  color: var(--t3); background: none;
  border: 1px solid var(--line2); border-radius: 3px;
  padding: 4px 10px; cursor: pointer; transition: all 0.12s;
}
.rst-btn:active { color: var(--red); border-color: var(--red); }

/* ── AVATAR ── */
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #000;
  flex-shrink: 0; letter-spacing: 0;
}

/* ── SECTION ── */
.section { border-bottom: 1px solid var(--line); }
.sec-hd {
  display: flex; align-items: center; gap: 10px; justify-content: space-between;
  padding: 10px 18px;
  border-top: 1px solid var(--line);
  min-height: 52px;
}
.sec-hd-left { display: flex; align-items: center; gap: 8px; }
.sec-name { font-size: 15px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px; }
.sec-count { font-size: 11px; color: var(--t3); }

/* ── ROOM ROW ── */
.room {
  display: flex; align-items: center;
  padding: 10px 18px;
  border-top: 1px solid var(--line);
  gap: 12px;
  min-height: 52px;
  transition: background 0.1s;
}

.room-name {
  font-size: 12px; font-weight: 500; color: #707070;
  flex: 0 0 108px; letter-spacing: 0;
}
.steps-wrap { display: flex; gap: 5px; flex: 1; }
.step { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; max-width: 48px; }
.step input { display: none; }
.step-box {
  width: 100%; aspect-ratio: 1; max-width: 40px;
  border: 1px solid var(--line2);
  border-radius: 4px;
  background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.12s;
  font-size: 15px;
  position: relative;
}
.step-box:active { transform: scale(0.87); }
.step-icon { opacity: 0.4; line-height: 1; transition: opacity 0.12s; }
.step input:checked + .step-box { background: var(--s4); border-color: var(--green); }
.step input:checked + .step-box .step-icon { opacity: 1; }
.step-txt {
  font-size: 8px; font-weight: 500; color: var(--t3);
  letter-spacing: 0.2px; text-align: center; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40px;
}
.step input:checked ~ .step-txt { color: var(--green); }

.room-tag {
  flex-shrink: 0;
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 2px;
  letter-spacing: 0.3px; text-transform: uppercase;
}
.room-tag.done  { background: rgba(61,153,112,0.12); color: var(--green); }
.room-tag.wip   { background: rgba(212,168,67,0.10); color: var(--accent); }
.room-tag.empty { color: var(--t3); }

/* ── FOOTER ── */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 1px solid var(--line);
}
.wa-btn {
  width: 100%;
  background: #25D366; color: #000;
  font-family: inherit; font-size: 14px; font-weight: 700;
  border: none; border-radius: 4px; padding: 13px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; transition: opacity 0.12s;
}
.wa-btn:active { opacity: 0.8; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 76px;
  left: 50%; transform: translateX(-50%) translateY(6px);
  background: var(--s3); border: 1px solid var(--line2);
  color: var(--t1); font-size: 12px; font-weight: 500;
  padding: 8px 16px; border-radius: 3px;
  opacity: 0; pointer-events: none;
  transition: all 0.18s; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ════════════════════════════
   SETTINGS SHEET
════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border-top: 1px solid var(--line2);
  z-index: 101;
  max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.32,0,.15,1);
  padding-bottom: env(safe-area-inset-bottom);
}
.sheet.open { transform: translateY(0); }

.sh-handle { width: 32px; height: 3px; background: var(--line2); border-radius: 99px; margin: 10px auto 0; flex-shrink: 0; }
.sh-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0;
}
.sh-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.sh-close {
  width: 26px; height: 26px; background: var(--s3); border: none; border-radius: 3px;
  color: var(--t2); cursor: pointer; font-family: inherit; font-size: 13px;
  display: flex; align-items: center; justify-content: center; transition: background 0.12s;
}
.sh-close:active { background: var(--s4); }

.sh-body { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; padding: 16px 18px 24px; }

.sg { margin-bottom: 20px; }
.sg-lbl {
  font-size: 10px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px; padding-left: 2px;
}

.si {
  width: 100%; background: var(--s2); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--t1);
  font-family: inherit; font-size: 14px; font-weight: 500;
  padding: 10px 12px; outline: none; transition: border-color 0.12s;
  margin-bottom: 6px;
}
.si:focus { border-color: var(--accent); }
.si::placeholder { color: var(--t3); }
.si:last-child { margin-bottom: 0; }

/* ── Drag handle ── */
.drag-handle {
  display: flex; align-items: center; justify-content: center;
  width: 20px; height: 100%; cursor: grab; flex-shrink: 0;
  color: var(--t3); padding: 0 2px;
  touch-action: none;
}
.drag-handle:active { cursor: grabbing; }
.drag-handle svg { width: 14px; height: 14px; pointer-events: none; }
.sortable-ghost { opacity: 0.3; background: var(--s3) !important; }
.sortable-drag   { opacity: 0.95; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }

/* Steps list */
.step-row-s {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 0; border-top: 1px solid var(--line);
}
.step-row-s:first-child { border-top: none; }
.si-icon {
  width: 40px; background: var(--s2); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--t1);
  font-family: inherit; font-size: 16px;
  padding: 7px 5px; outline: none; text-align: center; flex-shrink: 0;
}
.si-icon:focus { border-color: var(--accent); }
.si-name {
  flex: 1; background: var(--s2); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--t1);
  font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 7px 10px; outline: none; transition: border-color 0.12s;
}
.si-name:focus { border-color: var(--accent); color: var(--t1); }

/* Crew list */
.crew-item {
  background: var(--s2); border: 1px solid var(--line);
  border-radius: 4px; margin-bottom: 6px; overflow: hidden;
}
.ci-hd {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 10px;
}
.ci-expand-btn {
  background: none; border: none; color: var(--t3);
  font-size: 9px; cursor: pointer; padding: 4px; flex-shrink: 0;
  transition: transform 0.18s; line-height: 1;
}
.crew-item.exp .ci-expand-btn { transform: rotate(90deg); }
.ci-name {
  flex: 1; background: transparent; border: none;
  color: var(--t1); font-family: inherit; font-size: 13px; font-weight: 600;
  outline: none; padding: 4px 6px; border-radius: 3px;
  transition: background 0.12s;
}
.ci-name:focus { background: var(--s3); }

.del-btn {
  width: 28px; height: 28px; background: none; border: none;
  color: var(--t3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; transition: all 0.12s; flex-shrink: 0;
}
.del-btn:active { color: var(--red); background: rgba(192,57,43,0.1); }
.del-btn svg { width: 14px; height: 14px; pointer-events: none; }

.crew-rooms { padding: 0 10px 8px; display: none; border-top: 1px solid var(--line); }
.crew-item.exp .crew-rooms { display: block; }

.room-row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 0; border-bottom: 1px solid var(--line);
}
.room-row:last-child { border-bottom: none; }
.rn-input {
  flex: 1; background: transparent; border: none;
  color: var(--t2); font-family: inherit; font-size: 12px;
  outline: none; padding: 4px 6px; border-radius: 3px;
  transition: background 0.12s;
}
.rn-input:focus { color: var(--t1); background: var(--s3); }

.add-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px dashed var(--line2);
  border-radius: 4px; color: var(--t3);
  font-family: inherit; font-size: 11px; font-weight: 500;
  padding: 7px 10px; cursor: pointer; width: 100%; margin-top: 8px;
  transition: all 0.12s;
}
.add-btn:active { border-color: var(--t2); color: var(--t2); }
.add-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

.add-crew-btn {
  width: 100%; padding: 10px;
  background: var(--s2); border: 1px solid var(--line2);
  border-radius: 4px; color: var(--t2);
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.12s; margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.add-crew-btn:active { background: var(--s3); color: var(--t1); }

/* Firebase */
.fb-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.fb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--t3); flex-shrink: 0; }
.fb-dot.ok { background: var(--green); }
.fb-txt { font-size: 11px; color: var(--t3); }

.save-btn {
  width: 100%; padding: 12px;
  background: var(--accent); color: #000;
  font-family: inherit; font-size: 14px; font-weight: 700;
  border: none; border-radius: 4px; cursor: pointer;
  margin-top: 16px; transition: opacity 0.12s;
}
.save-btn:active { opacity: 0.8; }

/* ── SCHEDULE SHEET ── */
.sched-sheet {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 200;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(.32,0,.15,1);
}
.sched-sheet.open { transform: translateX(0); }

.sched-hd {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 18px 12px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.sched-back {
  width: 32px; height: 32px;
  background: var(--s2); border: 1px solid var(--line2);
  border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--t2); flex-shrink: 0; transition: all 0.12s;
}
.sched-back:active { background: var(--s3); }
.sched-back svg { width: 16px; height: 16px; }
.sched-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.sched-sub { font-size: 11px; color: var(--t3); margin-top: 1px; }

.day-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex: 1; min-width: 64px;
  padding: 10px 4px;
  font-size: 11px; font-weight: 600; color: var(--t3);
  text-align: center; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.12s; white-space: nowrap;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.day-tab.on { color: var(--accent); border-bottom-color: var(--accent); }

.sched-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.room-sched { border-bottom: 1px solid var(--line); }
.room-sched-hd {
  padding: 10px 18px 6px;
  font-size: 11px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: 0.8px;
  background: var(--s1);
}

.sched-tile {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 18px;
  border-top: 1px solid var(--line);
}
.sched-tile-time {
  font-size: 11px; font-weight: 600; color: var(--accent);
  flex-shrink: 0; padding-top: 2px; min-width: 38px;
}
.sched-tile-body { flex: 1; }
.sched-tile-name { font-size: 13px; font-weight: 600; color: var(--t1); letter-spacing: -0.1px; line-height: 1.4; }
.sched-tile-meta { font-size: 11px; color: var(--t3); margin-top: 3px; }
.sched-tile-badge {
  font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 2px;
  text-transform: uppercase; letter-spacing: 0.4px;
  display: inline-block; margin-top: 4px;
}
.badge-rw { background: rgba(212,168,67,0.15); color: var(--accent); }
.badge-r  { background: rgba(76,175,116,0.12); color: var(--green); }
.badge-w  { background: rgba(94,106,210,0.15); color: #818cf8; }
.badge-s  { background: rgba(239,68,68,0.12); color: #f87171; }

.sched-empty {
  padding: 24px 18px;
  font-size: 13px; color: var(--t3); text-align: center;
}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-left">
    <div class="hd-title" id="confTitle">Setup Tracker</div>
    <div class="hd-sub" id="confSub">—</div>
  </div>
  <div class="hd-right">
    <div class="stat">
      <div class="stat-num" id="statNum">0/0</div>
      <div class="stat-lbl">Rooms Done</div>
    </div>
    <div class="gear-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-row">
    <div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;padding:5px 6px 5px 0;white-space:nowrap;align-self:center;">Filter</div>
    <div id="filterRow" style="display:flex;gap:6px;"></div>
  </div>
</div>

<div class="top-bar">
  <button class="rst-btn" onclick="confirmReset()">Reset all</button>
</div>

<div id="tracker"></div>



<div class="toast" id="toast"></div>

<!-- SCHEDULE SHEET -->
<div class="sched-sheet" id="schedSheet">
  <div class="sched-hd">
    <div class="sched-back" onclick="closeSchedule()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div>
      <div class="sched-title" id="schedTitle">Schedule</div>
      <div class="sched-sub" id="schedSub"></div>
    </div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="sched-body" id="schedBody"></div>
</div>

<div class="overlay" id="overlay" onclick="closeSettings()"></div>
<div class="sheet" id="sheet">
  <div class="sh-handle"></div>
  <div class="sh-hd">
    <div class="sh-title">Settings</div>
    <button class="sh-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="sh-body" id="shBody"></div>
</div>

<script>
const AVATAR_COLORS = ['#e8c547','#e87d47','#e84774','#a347e8','#478ce8','#47e8a0','#e8476b','#47e8d4','#c8e847','#e88347'];
function avatarColor(name) {
  let h = 0; for (let i=0; i<name.length; i++) h = name.charCodeAt(i) + ((h<<5)-h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function avatarInitials(name) {
  const parts = name.trim().split(' ');
  return parts.length > 1 ? parts[0][0]+parts[1][0] : name.slice(0,2).toUpperCase();
}
function avatarHtml(name, size=26) {
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${avatarColor(name)}">${avatarInitials(name)}</div>`;
}

    'r18': { sun:[], mon:[], tue:[{time:'All day',end:'',name:'CN Theater — Noise Filter',badge:'rw'}], wed:[{time:'All day',end:'',name:'CN Theater — Noise Filter',badge:'rw'}], thu:[{time:'All day',end:'',name:'CN Theater — Noise Filter',badge:'rw'}] },
  },
  lynda: {
    'r19': { sun:[], mon:[{time:'All day',end:'',name:'Co-Lo 16 — FluxCon AM + CiliumCon PM 24hr',badge:'rw'}], tue:[{time:'All day',end:'',name:'Breakout 15 + Keynote Overflow',badge:'rw'}], wed:[{time:'All day',end:'',name:'Breakout 15 + Keynote Overflow',badge:'rw'}], thu:[{time:'All day',end:'',name:'Breakout 15 + Keynote Overflow',badge:'rw'}] },
    'r20': { sun:[], mon:[{time:'All day',end:'',name:'Project Lightning Talks',badge:'rw'}], tue:[{time:'All day',end:'',name:'Breakout 16 + Keynote Overflow',badge:'rw'}], wed:[{time:'All day',end:'',name:'Breakout 16 + Keynote Overflow',badge:'rw'}], thu:[{time:'All day',end:'',name:'Breakout 16 + Keynote Overflow',badge:'rw'}] },

};



let config = JSON.parse(localStorage.getItem('kc_config')||'null') || DEFAULT_CONFIG;
let state  = JSON.parse(localStorage.getItem('kc_state') ||'{}');
let filter = null;
let fbDb   = null;

function saveConfig() { localStorage.setItem('kc_config', JSON.stringify(config)); }
function saveState()  { localStorage.setItem('kc_state',  JSON.stringify(state)); }
function getVal(rid, sk) {
  if (state[rid]?.[sk] !== undefined) return state[rid][sk];
  return PREFILL[rid]?.[sk] || 0;
}
function isDone(rid)   { return config.steps.every(s => getVal(rid, s.key)); }
function countDone(rid){ return config.steps.filter(s => getVal(rid, s.key)).length; }

function toggle(rid, sk) {
  if (!state[rid]) { state[rid]={}; config.steps.forEach(s => state[rid][s.key]=getVal(rid,s.key)); }
  state[rid][sk] ^= 1;
  saveState();
  if (fbDb) fbDb.child('state/'+rid).set(state[rid]);
  render();
}

// Firebase
function initFirebase(url) {
  if (!url) return;
  const load = (src, cb) => { const s=document.createElement('script'); s.src=src; s.onload=cb; document.head.appendChild(s); };
  load('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js', () =>
    load('https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js', () => {
      try {
        const app = firebase.initializeApp({ databaseURL: url }, 'tr');
        fbDb = firebase.database(app).ref('e3-kc26-x7k9m');
        fbDb.child('state').on('value', s => { const v=s.val(); if(v){state=v;saveState();render();} });
        fbDb.child('config').on('value', s => { const v=s.val(); if(v&&v.steps&&v.crew){config=v;saveConfig();render();} });
        setFbStatus(true);
      } catch(e) { setFbStatus(false); }
    }));
}
function setFbStatus(ok) {
  const d=document.getElementById('fbDot'), t=document.getElementById('fbTxt');
  if(!d) return;
  d.className='fb-dot'+(ok?' ok':'');
  t.textContent=ok?'Connected — live sync active':'Not connected — local only';
}

// Render
function render() {
  document.getElementById('confTitle').textContent = config.title;
  document.getElementById('confSub').textContent   = config.subtitle;

  // Chips
  document.getElementById('filterRow').innerHTML = config.crew.map(c =>
    `<div class="fc${filter===c.id?' on':''}" onclick="toggleFilter('${c.id}')" style="gap:6px;display:flex;align-items:center;">
      ${avatarHtml(c.name, 18)}${c.name}
    </div>`
  ).join('');

  const el = document.getElementById('tracker');
  el.innerHTML = '';

  if (filter) {
    const crew = config.crew.find(c=>c.id===filter);
    const n = document.createElement('div'); n.className='f-notice';
    n.innerHTML=`<span>Showing <strong>${crew?.name}</strong></span><span class="f-clear" onclick="toggleFilter('${filter}')">Show all</span>`;
    el.appendChild(n);
  }

  let total=0, done=0;

  config.crew.forEach((c,ci) => {
    if (filter && filter!==c.id) return;
    const cd = c.rooms.filter(r=>isDone(r.id)).length;
    total += c.rooms.length; done += cd;

    const sec = document.createElement('div'); sec.className='section';
    sec.innerHTML=`<div class="sec-hd" onclick="openSchedule('${c.id}')" style="cursor:pointer;">
      <div class="sec-hd-left">${avatarHtml(c.name, 28)}<span class="sec-name">${c.name}</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="sec-count">${cd}/${c.rooms.length}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${c.id in SCHEDULE ? 'var(--accent)' : 'var(--t3)'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
    </div>`;

    c.rooms.forEach(room => {
      const d=isDone(room.id), n=countDone(room.id);
      const tag = d?'done':n>0?'wip':'empty';
      const tagTxt = d?'Done':n>0?`${n}/${config.steps.length}`:'—';
      const row = document.createElement('div'); row.className=`room${d?' done':''}`;
      row.innerHTML=`
        <div class="room-name">${room.name}</div>
        <div class="steps-wrap">
          ${config.steps.map(s=>{
            const checked=getVal(room.id,s.key), id=`${room.id}_${s.key}`;
            return `<div class="step">
              <input type="checkbox" id="${id}" ${checked?'checked':''} onchange="toggle('${room.id}','${s.key}')">
              <label class="step-box" for="${id}"><span class="step-icon">${s.icon}</span></label>
              <span class="step-txt">${s.label}</span>
            </div>`;
          }).join('')}
        </div>
        <div class="room-tag ${tag}">${tagTxt}</div>`;
      sec.appendChild(row);
    });
    el.appendChild(sec);
  });

  document.getElementById('statNum').textContent = `${done}/${total}`;
}

function toggleFilter(id) { filter=filter===id?null:id; render(); }

function confirmReset() {
  if (!confirm('Reset all progress?')) return;
  state={}; saveState();
  if (fbDb) fbDb.child('state').set({});
  showToast('Progress reset'); render();
}

function copyStatus() {
  const lines=['SET UP MASTER LIST:'];
  config.crew.forEach(c => c.rooms.forEach(room => {
    const checks=config.steps.filter(s=>getVal(room.id,s.key)).map(s=>s.icon).join('');
    lines.push(`${room.name}-${c.name}${checks?' '+checks:''}`);
  }));
  lines.push('');
  lines.push(config.steps.map(s=>`${s.icon} = ${s.label}`).join('  '));
  navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('Copied')).catch(()=>prompt('Copy:',lines.join('\n')));
}

// Settings
function openSettings() {
  renderSettings();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSettings() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow='';
}

const DRAG_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="5" r="1" fill="currentColor" stroke="none"/><circle cx="9" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="9" cy="19" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="5" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="19" r="1" fill="currentColor" stroke="none"/></svg>`;
const DEL_ICON  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
const X_ICON    = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

function renderSettings() {
  const body=document.getElementById('shBody');
  const stepsHtml = `<div id="stepsList">${config.steps.map((s,si)=>`
    <div class="step-row-s" data-si="${si}">
      <div class="drag-handle">${DRAG_ICON}</div>
      <input class="si-icon" value="${s.icon}" onchange="updateStep(${si},'icon',this.value)" maxlength="2">
      <input class="si-name" value="${s.label}" onchange="updateStep(${si},'label',this.value)" placeholder="Step name">
      <button class="del-btn" onclick="deleteStep(${si})" title="Remove">${DEL_ICON}</button>
    </div>`).join('')}</div>`;

  const crewHtml = `<div id="crewList">${config.crew.map((c,ci)=>`
    <div class="crew-item" id="ci_${ci}" data-ci="${ci}">
      <div class="ci-hd">
        <div class="drag-handle">${DRAG_ICON}</div>
        <button class="ci-expand-btn" onclick="toggleExp(${ci})">▶</button>
        <input class="ci-name" value="${c.name}" onchange="renameCrew(${ci},this.value)">
        <button class="del-btn" onclick="delCrew(${ci})" title="Remove">${DEL_ICON}</button>
      </div>
      <div class="crew-rooms">
        <div id="roomList_${ci}">${c.rooms.map((r,ri)=>`
          <div class="room-row" data-ri="${ri}">
            <div class="drag-handle">${DRAG_ICON}</div>
            <input class="rn-input" value="${r.name}" onchange="renameRoom(${ci},${ri},this.value)">
            <button class="del-btn" onclick="delRoom(${ci},${ri})">${X_ICON}</button>
          </div>`).join('')}</div>
        <button class="add-btn" onclick="addRoom(${ci})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add room
        </button>
      </div>
    </div>`).join('')}</div>`;

  body.innerHTML=`
    <div class="sg">
      <div class="sg-lbl">Conference</div>
      <input class="si" id="s_title" value="${config.title}" placeholder="Name">
      <input class="si" id="s_sub" value="${config.subtitle}" placeholder="Location / date">
    </div>
    <div class="sg">
      <div class="sg-lbl">Live Sync</div>
      <input class="si" id="s_fb" value="${config.firebaseUrl||''}" placeholder="Firebase Realtime DB URL" style="margin-bottom:0">
      <div class="fb-row"><div class="fb-dot${fbDb?' ok':''}" id="fbDot"></div><span class="fb-txt" id="fbTxt">${fbDb?'Connected — live sync active':'Not connected — local only'}</span></div>
    </div>
    <div class="sg">
      <div class="sg-lbl">Steps</div>
      ${stepsHtml}
      <button class="add-btn" onclick="addStep()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add step
      </button>
    </div>
    <div class="sg">
      <div class="sg-lbl">Crew & Rooms</div>
      ${crewHtml}
      <button class="add-crew-btn" onclick="addCrew()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add crew member
      </button>
    </div>
    <button class="save-btn" onclick="saveSettings()">Save & Apply</button>
    <div style="height:8px"></div>`;

  // Init drag-and-drop
  initSortable();
}

function initSortable() {
  if (typeof Sortable === 'undefined') return;
  // Steps
  const sl = document.getElementById('stepsList');
  if (sl) new Sortable(sl, {
    handle: '.drag-handle', animation: 150,
    ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
    onEnd: e => { const s=config.steps.splice(e.oldIndex,1)[0]; config.steps.splice(e.newIndex,0,s); }
  });
  // Crew
  const cl = document.getElementById('crewList');
  if (cl) new Sortable(cl, {
    handle: '.ci-hd > .drag-handle', animation: 150,
    ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
    onEnd: e => { const c=config.crew.splice(e.oldIndex,1)[0]; config.crew.splice(e.newIndex,0,c); }
  });
  // Rooms per crew
  config.crew.forEach((_,ci) => {
    const rl = document.getElementById('roomList_'+ci);
    if (rl) new Sortable(rl, {
      handle: '.drag-handle', animation: 150,
      ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
      onEnd: e => { const r=config.crew[ci].rooms.splice(e.oldIndex,1)[0]; config.crew[ci].rooms.splice(e.newIndex,0,r); }
    });
  });
}

function toggleExp(ci) {
  const el = document.getElementById('ci_'+ci);
  if (el) {
    el.classList.toggle('exp');
    const btn = el.querySelector('.ci-expand-btn');
    if (btn) btn.style.transform = el.classList.contains('exp') ? 'rotate(90deg)' : '';
  }
}
function renameCrew(ci,v){ config.crew[ci].name=v.trim()||config.crew[ci].name; }
function renameRoom(ci,ri,v){ config.crew[ci].rooms[ri].name=v.trim()||config.crew[ci].rooms[ri].name; }
function delCrew(ci){ if(!confirm(`Remove ${config.crew[ci].name}?`))return; config.crew.splice(ci,1); renderSettings(); }
function delRoom(ci,ri){ config.crew[ci].rooms.splice(ri,1); renderSettings(); }
function addRoom(ci){ config.crew[ci].rooms.push({id:'r_'+Date.now(),name:'New Room'}); renderSettings(); setTimeout(()=>document.getElementById('ci_'+ci)?.classList.add('exp'),10); }
function addCrew(){ config.crew.push({id:'c_'+Date.now(),name:'New Person',rooms:[]}); renderSettings(); }
function updateStep(si,f,v){ config.steps[si][f]=v.trim()||config.steps[si][f]; }
function deleteStep(si){ if(config.steps.length<=1){showToast('Need at least one step');return;} config.steps.splice(si,1); renderSettings(); }
function addStep(){ config.steps.push({key:'s_'+Date.now(),icon:'⭐',label:'New Step'}); renderSettings(); }

function saveSettings() {
  config.title    = document.getElementById('s_title').value.trim()||config.title;
  config.subtitle = document.getElementById('s_sub').value.trim()||config.subtitle;
  const fbUrl     = document.getElementById('s_fb').value.trim();
  if (fbUrl && fbUrl!==config.firebaseUrl) { config.firebaseUrl=fbUrl; initFirebase(fbUrl); }
  config.firebaseUrl = fbUrl;
  config.steps = config.steps.map(s=>({...s, key:s.key||'s_'+Date.now()}));
  saveConfig();
  if (fbDb) fbDb.child('config').set(config);
  render(); closeSettings(); showToast('Saved');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

if (config.firebaseUrl) initFirebase(config.firebaseUrl);
render();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

let schedDay = 'sun';
let schedCrewId = null;

function openSchedule(crewId) {
  const crew = config.crew.find(c => c.id === crewId);
  if (!crew) return;
  schedCrewId = crewId;

  // Default to today's day
  const today = new Date();
  const march = [22,23,24,25,26];
  const dayKeys = ['sun','mon','tue','wed','thu'];
  const idx = march.indexOf(today.getDate());
  if (idx >= 0 && today.getMonth() === 2) schedDay = dayKeys[idx];
  else schedDay = 'sun';

  document.getElementById('schedTitle').textContent = crew.name;
  document.getElementById('schedSub').textContent = 'Room schedule — KubeCon EU 2026';
  renderSchedule();
  document.getElementById('schedSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSchedule() {
  document.getElementById('schedSheet').classList.remove('open');
  document.body.style.overflow = '';
}

function renderSchedule() {
  const crew = config.crew.find(c => c.id === schedCrewId);
  if (!crew) return;
  const crewSched = SCHEDULE[schedCrewId] || {};

  // Day tabs
  document.getElementById('dayTabs').innerHTML = DAYS.map(d =>
    `<div class="day-tab${schedDay===d.key?' on':''}" onclick="setSchedDay('${d.key}')">${d.label}</div>`
  ).join('');

  // Body
  const body = document.getElementById('schedBody');
  body.innerHTML = crew.rooms.map(room => {
    const sessions = crewSched[room.id]?.[schedDay] || [];
    const tilesHtml = sessions.length
      ? sessions.map(s => `
          <div class="sched-tile">
            <div class="sched-tile-time">${s.time}</div>
            <div class="sched-tile-body">
              <div class="sched-tile-name">${s.name}</div>
              ${s.end ? `<div class="sched-tile-meta">Until ${s.end}</div>` : ''}
              <span class="sched-tile-badge badge-${s.badge}">${s.badge==='rw'?'Record + Wordly':s.badge==='r'?'Record only':s.badge==='w'?'Wordly only':'Streaming'}</span>
            </div>
          </div>`).join('')
      : `<div class="sched-empty">No sessions scheduled</div>`;
    return `<div class="room-sched">
      <div class="room-sched-hd" style="display:flex;align-items:center;justify-content:space-between;">
        <span>${room.name}</span>
        <a href="https://maintainersummiteu2026.sched.com/venue/${encodeURIComponent(room.name)}" target="_blank"
          style="font-size:10px;color:var(--accent);text-decoration:none;font-weight:600;letter-spacing:0.3px;" onclick="event.stopPropagation()">
          Sched ↗
        </a>
      </div>
      ${tilesHtml}
    </div>`;
  }).join('');
}

function setSchedDay(day) {
  schedDay = day;
  renderSchedule();
}
</script>
