<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KubeCon 2026 · Setup Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080808;
    --surface:   #111111;
    --surface2:  #161616;
    --border:    rgba(255,255,255,0.06);
    --border2:   rgba(255,255,255,0.10);
    --accent:    #6366f1;
    --accent-dim:rgba(99,102,241,0.12);
    --green:     #22c55e;
    --green-dim: rgba(34,197,94,0.10);
    --amber:     #f59e0b;
    --text:      #f4f4f5;
    --text-2:    #a1a1aa;
    --text-3:    #52525b;
    --radius:    14px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 120px;
  }

  /* ── Header ── */
  .header {
    padding: 20px 20px 0;
    margin-bottom: 28px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 20px rgba(99,102,241,0.3);
  }
  .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .badge {
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid rgba(99,102,241,0.2);
    letter-spacing: 0.2px;
  }
  .header-meta {
    font-size: 12px;
    color: var(--text-3);
    font-weight: 400;
  }

  /* ── Global progress ── */
  .global-card {
    margin: 0 16px 24px;
    background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(139,92,246,0.06));
    border: 1px solid rgba(99,102,241,0.18);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .global-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 12px;
  }
  .global-label { font-size: 12px; color: var(--text-2); font-weight: 500; }
  .global-count { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
  .global-count span { font-size: 14px; font-weight: 400; color: var(--text-3); }
  .global-bar { height: 5px; background: rgba(255,255,255,0.06); border-radius: 99px; }
  .global-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 10px rgba(99,102,241,0.4);
  }

  /* ── Section ── */
  .section { margin-bottom: 8px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    margin-bottom: 8px;
  }
  .section-crew {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .crew-label { font-size: 13px; font-weight: 600; }
  .crew-progress { font-size: 11px; color: var(--text-3); }

  /* ── Room card ── */
  .room-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin: 0 16px 8px;
    transition: border-color 0.2s;
  }
  .room-card.complete {
    background: var(--green-dim);
    border-color: rgba(34,197,94,0.18);
  }
  .room-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .room-name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .room-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .room-tag.done  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .room-tag.wip   { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
  .room-tag.todo  { background: rgba(255,255,255,0.04); color: var(--text-3); border: 1px solid var(--border); }

  /* ── Step pills ── */
  .steps { display: flex; gap: 6px; }
  .step { flex: 1; }
  .step input { display: none; }
  .step-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .step-label:active { transform: scale(0.93); }
  .step-icon { font-size: 16px; line-height: 1; min-height: 16px; }
  .step-icon.empty { display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--border2); margin: 5px auto 5px; }
  .step-name { font-size: 9px; font-weight: 500; color: var(--text-3); letter-spacing: 0.3px; }

  .step input:checked + .step-label {
    background: var(--green-dim);
    border-color: rgba(34,197,94,0.3);
  }
  .step input:checked + .step-label .step-name { color: var(--green); }

  /* ── Room bar ── */
  .room-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 99px; margin-top: 10px; }
  .room-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--green), #16a34a);
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Divider ── */
  .divider { height: 1px; background: var(--border); margin: 16px 20px; }

  /* ── Footer CTA ── */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--bg) 80%, transparent);
  }
  .copy-btn {
    width: 100%;
    padding: 15px;
    background: #25D366;
    color: #000;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.2px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.15s;
    box-shadow: 0 8px 24px rgba(37,211,102,0.25);
  }
  .copy-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* ── Toast ── */
  /* ── User picker ── */
  .user-picker {
    margin: 0 16px 20px;
  }
  .user-picker-label {
    font-size: 11px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .user-chips {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .user-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text-2);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .user-chip:active { transform: scale(0.95); }
  .user-chip.active {
    background: var(--accent-dim);
    border-color: rgba(99,102,241,0.35);
    color: var(--text);
  }
  .user-chip .chip-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-3);
    flex-shrink: 0;
  }
  .user-chip.active .chip-dot { background: var(--accent); }

  /* ── Reset button ── */
  .reset-btn {
    display: flex; align-items: center; gap: 6px;
    margin: 0 16px 8px auto;
    width: fit-content;
    background: none;
    border: 1px solid rgba(239,68,68,0.2);
    color: #ef4444;
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .reset-btn:active { background: rgba(239,68,68,0.08); transform: scale(0.96); }

  /* ── Section highlight ── */
  .section.mine .room-card {
    border-color: rgba(99,102,241,0.2);
  }
  .section.mine .section-header .crew-label::after {
    content: ' · You';
    color: var(--accent);
    font-size: 11px;
    font-weight: 400;
  }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 99px;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <div class="logo-text">KubeCon 2026</div>
    </div>
    <div class="badge">RAI Amsterdam</div>
  </div>
  <div class="header-meta">Room Setup Tracker · March 21–22</div>
</div>

<div class="global-card">
  <div class="global-row">
    <div>
      <div class="global-label">Overall Progress</div>
      <div class="global-count" id="globalCount">0 <span>/ 0 rooms done</span></div>
    </div>
    <div style="text-align:right">
      <div class="global-label">Completion</div>
      <div style="font-size:20px;font-weight:700;letter-spacing:-0.5px" id="globalPct">0%</div>
    </div>
  </div>
  <div class="global-bar"><div class="global-fill" id="globalFill" style="width:0%"></div></div>
</div>

<!-- User picker -->
<div class="user-picker">
  <div class="user-picker-label">Who are you?</div>
  <div class="user-chips" id="userChips"></div>
</div>

<!-- Reset -->
<button class="reset-btn" onclick="confirmReset()">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
  Reset all
</button>

<div id="tracker"></div>

<div class="footer">
  <button class="copy-btn" onclick="copyStatus()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
    Copy Status for WhatsApp
  </button>
</div>

<div class="toast" id="toast">✅ Copied to clipboard</div>

<script>
const STEPS = [
  { key: 'setup',   icon: '🔧', name: 'Setup'  },
  { key: 'ptz',     icon: '🎥', name: 'PTZ'    },
  { key: 'stream',  icon: '🔑', name: 'Keys'   },
  { key: 'parsec',  icon: '💻', name: 'Parsec' },
  { key: 'tested',  icon: '✅', name: 'Tested' },
];

const CREW = [
  { name: 'Alexi',   rooms: ['E103-105', 'E106-108', 'Auditorium'] },
  { name: 'Clayton', rooms: ['Hall 7A', 'Hall 7B', 'Hall 7C'] },
  { name: 'Will',    rooms: ['Hall 8D', 'Hall 8E', 'Hall 8F', 'Hall 8G'] },
  { name: 'Costmo',  rooms: ['Hall 12', 'Forum', 'Hall 8G (co)'] },
  { name: 'Johnick', rooms: ['Emerald', 'G102-105'] },
  { name: 'Brent',   rooms: ['F002-005', 'Amtrium 1+2', 'CN Theater'] },
  { name: 'Lynda',   rooms: ['Elicium 1', 'Elicium 2'] },
];

const PREFILL = {
  'E103-105':    { setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'E106-108':    { setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'Auditorium':  { setup:1, ptz:1, stream:0, parsec:0, tested:0 },
  'Hall 7A':     { setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'Hall 7B':     { setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'Hall 7C':     { setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'Hall 8D':     { setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'Hall 8E':     { setup:1, ptz:1, stream:1, parsec:1, tested:0 },
  'Hall 8F':     { setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'Hall 8G':     { setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'Hall 12':     { setup:0, ptz:0, stream:0, parsec:0, tested:0 },
  'Forum':       { setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'Hall 8G (co)':{ setup:1, ptz:1, stream:1, parsec:1, tested:1 },
  'Emerald':     { setup:1, ptz:0, stream:0, parsec:0, tested:0 },
  'G102-105':    { setup:1, ptz:0, stream:0, parsec:0, tested:0 },
  'F002-005':    { setup:1, ptz:0, stream:0, parsec:0, tested:0 },
  'Amtrium 1+2': { setup:1, ptz:0, stream:0, parsec:0, tested:0 },
  'CN Theater':  { setup:1, ptz:0, stream:0, parsec:0, tested:0 },
  'Elicium 1':   { setup:1, ptz:0, stream:0, parsec:0, tested:0 },
  'Elicium 2':   { setup:1, ptz:0, stream:0, parsec:0, tested:0 },
};

let currentUser = localStorage.getItem('kc26_user') || null;

function setUser(name) {
  currentUser = name;
  localStorage.setItem('kc26_user', name);
  render();
}

function renderUserChips() {
  const el = document.getElementById('userChips');
  el.innerHTML = CREW.map(c => `
    <div class="user-chip ${currentUser === c.name ? 'active' : ''}" onclick="setUser('${c.name}')">
      <span class="chip-dot"></span>${c.name}
    </div>`).join('');
}

function confirmReset() {
  if (confirm('Reset ALL rooms to empty? This cannot be undone.')) {
    localStorage.removeItem('kc26');
    showToast('🔄 All rooms reset');
    render();
  }
}

function getState() {
  try { return JSON.parse(localStorage.getItem('kc26') || '{}'); } catch { return {}; }
}
function saveState(s) { localStorage.setItem('kc26', JSON.stringify(s)); }
function rk(crew, room) { return crew + '::' + room; }
function getVal(state, crew, room, step) {
  const k = rk(crew, room);
  if (state[k]?.[step] !== undefined) return state[k][step];
  return PREFILL[room]?.[step] || 0;
}
function isDone(state, crew, room) { return STEPS.every(s => getVal(state, crew, room, s.key)); }
function countDone(state, crew, room) { return STEPS.filter(s => getVal(state, crew, room, s.key)).length; }

function toggle(crew, room, step) {
  const state = getState();
  const k = rk(crew, room);
  if (!state[k]) { state[k] = {}; STEPS.forEach(s => state[k][s.key] = getVal({}, crew, room, s.key)); }
  state[k][step] = state[k][step] ? 0 : 1;
  saveState(state);
  render();
}

function avatarInitials(name) { return name.slice(0, 2).toUpperCase(); }

function render() {
  const state = getState();
  const el = document.getElementById('tracker');
  el.innerHTML = '';

  let totalRooms = 0, doneRooms = 0;

  CREW.forEach((c, ci) => {
    const crewDone = c.rooms.filter(r => isDone(state, c.name, r)).length;
    totalRooms += c.rooms.length;
    doneRooms += crewDone;

    const sec = document.createElement('div');
    sec.className = `section${currentUser === c.name ? ' mine' : ''}`;

    sec.innerHTML = `
      <div class="section-header">
        <div class="section-crew">
          <div class="avatar">${avatarInitials(c.name)}</div>
          <div class="crew-label">${c.name}</div>
        </div>
        <div class="crew-progress">${crewDone} / ${c.rooms.length} done</div>
      </div>`;

    c.rooms.forEach(room => {
      const done = isDone(state, c.name, room);
      const n = countDone(state, c.name, room);
      const pct = Math.round(n / STEPS.length * 100);
      const tag = done ? 'done' : n > 0 ? 'wip' : 'todo';
      const tagLabel = done ? 'Done' : n > 0 ? `${n}/5` : 'Todo';

      const card = document.createElement('div');
      card.className = `room-card${done ? ' complete' : ''}`;
      card.innerHTML = `
        <div class="room-top">
          <div class="room-name">${room}</div>
          <div class="room-tag ${tag}">${tagLabel}</div>
        </div>
        <div class="steps">
          ${STEPS.map(s => {
            const checked = getVal(state, c.name, room, s.key);
            const id = `${c.name}_${room}_${s.key}`.replace(/[\s()+]/g,'_');
            return `<div class="step">
              <input type="checkbox" id="${id}" ${checked?'checked':''} onchange="toggle('${c.name}','${room}','${s.key}')">
              <label class="step-label" for="${id}">
                <span class="step-icon">${s.icon}</span>
                <span class="step-name">${s.name}</span>
              </label>
            </div>`;
          }).join('')}
        </div>
        <div class="room-bar"><div class="room-fill" style="width:${pct}%"></div></div>`;
      sec.appendChild(card);
    });

    if (ci < CREW.length - 1) {
      const d = document.createElement('div');
      d.className = 'divider';
      sec.appendChild(d);
    }

    el.appendChild(sec);
  });

  // Global stats
  const gPct = totalRooms ? Math.round(doneRooms / totalRooms * 100) : 0;
  document.getElementById('globalCount').innerHTML = `${doneRooms} <span>/ ${totalRooms} rooms done</span>`;
  document.getElementById('globalPct').textContent = gPct + '%';
  document.getElementById('globalFill').style.width = gPct + '%';
}

function copyStatus() {
  const state = getState();
  const lines = ['🎬 *KubeCon 2026 — Setup Status*', `📍 RAI Amsterdam · ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`, ''];

  CREW.forEach(c => {
    const doneCount = c.rooms.filter(r => isDone(state, c.name, r)).length;
    lines.push(`*${c.name}* · ${doneCount}/${c.rooms.length}`);
    c.rooms.forEach(room => {
      const done = isDone(state, c.name, room);
      const checks = STEPS.map(s => getVal(state, c.name, room, s.key) ? s.icon : '·').join(' ');
      lines.push(`  ${done ? '✅' : '🔄'} ${room} ${checks}`);
    });
    lines.push('');
  });

  lines.push(`_🔧 Setup · 🎥 PTZ · 🔑 Keys · 💻 Parsec · ✅ Tested_`);

  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('✅ Copied to clipboard'))
    .catch(() => { prompt('Copy this:', text); });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

renderUserChips();
render();
</script>
</body>
</html>
