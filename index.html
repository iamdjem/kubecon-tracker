<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Setup Tracker · KubeCon EU 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:       #0a0a0a;
  --s1:       #111111;
  --s2:       #161616;
  --s3:       #1e1e1e;
  --b1:       rgba(255,255,255,0.06);
  --b2:       rgba(255,255,255,0.10);
  --b3:       rgba(255,255,255,0.16);
  --t1:       #ffffff;
  --t2:       #8c8c8c;
  --t3:       #444444;
  --accent:   #5e6ad2;
  --a-glow:   rgba(94,106,210,0.15);
  --a-border: rgba(94,106,210,0.3);
  --green:    #4caf74;
  --g-glow:   rgba(76,175,116,0.12);
  --g-border: rgba(76,175,116,0.25);
  --r:        12px;
}

html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 100px;
  min-height: 100vh;
}

/* ─── HEADER ─── */
.header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--b1);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.4px;
  color: var(--t1);
}
.header-sub {
  font-size: 12px;
  color: var(--t3);
  font-weight: 400;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.progress-ring-wrap { position: relative; width: 44px; height: 44px; }
.progress-ring-wrap svg { transform: rotate(-90deg); }
.progress-ring-track { fill: none; stroke: var(--s3); stroke-width: 3; }
.progress-ring-fill  { fill: none; stroke: var(--green); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.5s cubic-bezier(.4,0,.2,1); }
.progress-pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--t1);
}

/* ─── FILTER CHIPS ─── */
.filter-wrap {
  padding: 0 20px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-wrap::-webkit-scrollbar { display: none; }
.filter-row {
  display: flex; gap: 6px;
  width: max-content;
}
.filter-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: 99px;
  font-size: 12px; font-weight: 500; color: var(--t2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  user-select: none;
}
.filter-chip:active { transform: scale(0.94); }
.filter-chip.on {
  background: var(--a-glow);
  border-color: var(--a-border);
  color: var(--t1);
}
.filter-chip .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--t3); flex-shrink: 0;
  transition: background 0.15s;
}
.filter-chip.on .dot { background: var(--accent); }

/* ─── FILTER BANNER ─── */
.filter-banner {
  margin: 0 16px 12px;
  padding: 9px 14px;
  background: var(--a-glow);
  border: 1px solid var(--a-border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: #a5b4fc;
}
.filter-banner-clear {
  font-size: 12px; font-weight: 500; color: #818cf8;
  cursor: pointer; padding: 2px 0;
}

/* ─── SECTION ─── */
.section { margin-bottom: 4px; }
.section-label {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px 6px;
}
.section-name {
  font-size: 11px; font-weight: 600;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.section-count { font-size: 11px; color: var(--t3); }

/* ─── ROOM CARD ─── */
.card {
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: var(--r);
  margin: 0 12px 6px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.card.done { border-color: var(--g-border); background: var(--g-glow); }

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px 10px;
}
.card-name {
  font-size: 14px; font-weight: 600;
  letter-spacing: -0.2px;
}
.card-status {
  font-size: 11px; font-weight: 500;
  padding: 2px 8px; border-radius: 99px;
}
.card-status.s-done  { background: var(--g-glow); color: var(--green); border: 1px solid var(--g-border); }
.card-status.s-wip   { background: rgba(245,158,11,0.08); color: #d97706; border: 1px solid rgba(245,158,11,0.2); }
.card-status.s-empty { background: var(--s2); color: var(--t3); border: 1px solid var(--b1); }

/* ─── STEP ROW ─── */
.step-row {
  display: flex;
  padding: 0 14px 12px;
  gap: 6px;
}
.step {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.step input { display: none; }
.step-btn {
  width: 100%;
  aspect-ratio: 1;
  max-width: 48px;
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s cubic-bezier(.4,0,.2,1);
  font-size: 17px;
  position: relative;
  overflow: hidden;
}
.step-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: var(--green);
  opacity: 0;
  transition: opacity 0.15s;
  border-radius: inherit;
}
.step-btn:active { transform: scale(0.88); }
.step input:checked + .step-btn {
  background: var(--g-glow);
  border-color: var(--g-border);
}
.step-icon {
  position: relative; z-index: 1;
  font-size: 17px; line-height: 1;
  transition: opacity 0.15s;
}
/* unchecked: show icon faded */
.step-icon { opacity: 0.2; }
.step input:checked + .step-btn .step-icon { opacity: 1; }

.step-label {
  font-size: 9px; font-weight: 500;
  color: var(--t3); letter-spacing: 0.2px;
  text-align: center;
}
.step input:checked ~ .step-label { color: var(--green); }

/* ─── TRACK BAR ─── */
.card-track { height: 2px; background: var(--b1); }
.card-track-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), #38a169);
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}

/* ─── RESET ─── */
.top-actions {
  display: flex; justify-content: flex-end;
  padding: 0 16px 8px;
}
.reset-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: 1px solid rgba(239,68,68,0.15);
  color: rgba(239,68,68,0.6); font-family: inherit;
  font-size: 11px; font-weight: 500;
  padding: 5px 10px; border-radius: 8px;
  cursor: pointer; transition: all 0.15s;
}
.reset-btn:active { background: rgba(239,68,68,0.06); }

/* ─── FOOTER ─── */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, var(--bg) 70%, transparent);
}
.wa-btn {
  width: 100%;
  background: #25D366;
  color: #000;
  font-family: inherit; font-size: 15px; font-weight: 700;
  letter-spacing: -0.2px;
  border: none; border-radius: var(--r);
  padding: 15px 20px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(37,211,102,0.2);
  transition: opacity 0.15s, transform 0.1s;
}
.wa-btn:active { opacity: 0.88; transform: scale(0.98); }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 84px;
  left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--s3); border: 1px solid var(--b2);
  color: var(--t1); font-size: 13px; font-weight: 500;
  padding: 9px 18px; border-radius: 99px;
  opacity: 0; pointer-events: none;
  transition: all 0.2s cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── DIVIDER ─── */
.sep { height: 1px; background: var(--b1); margin: 10px 20px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">Setup Tracker</div>
    <div class="header-sub">KubeCon EU 2026 · RAI Amsterdam</div>
  </div>
  <div class="header-right">
    <div class="progress-ring-wrap">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle class="progress-ring-track" cx="22" cy="22" r="18"/>
        <circle class="progress-ring-fill" id="ringFill" cx="22" cy="22" r="18"
          stroke-dasharray="113.1" stroke-dashoffset="113.1"/>
      </svg>
      <div class="progress-pct" id="ringPct">0%</div>
    </div>
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-row" id="filterRow"></div>
</div>

<div class="top-actions">
  <button class="reset-btn" onclick="confirmReset()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
    Reset all
  </button>
</div>

<div id="tracker"></div>

<div class="footer">
  <button class="wa-btn" onclick="copyStatus()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l5.1-1.35C8.5 21.52 10.22 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.67 0-3.22-.46-4.55-1.26l-.32-.19-3.02.8.81-2.96-.21-.34A7.944 7.944 0 014 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/></svg>
    Copy for WhatsApp
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const STEPS = [
  { key: 'setup',  icon: '🔧', label: 'Setup'  },
  { key: 'ptz',    icon: '🤖', label: 'PTZ'    },
  { key: 'stream', icon: '🔑', label: 'Keys'   },
  { key: 'parsec', icon: '⚡', label: 'Parsec' },
  { key: 'tested', icon: '✏️', label: 'Tested' },
];

const CREW = [
  { name: 'Alexi',   rooms: ['E103-105', 'E106-108', 'Auditorium'] },
  { name: 'Clayton', rooms: ['Hall 7A', 'Hall 7B', 'Hall 7C'] },
  { name: 'Will',    rooms: ['Hall 8D', 'Hall 8E', 'Hall 8F', 'Hall 8G'] },
  { name: 'Costmo',  rooms: ['Hall 12', 'Forum', 'Hall 8G (co)'] },
  { name: 'Johnick', rooms: ['Emerald', 'G102-105'] },
  { name: 'Brent',   rooms: ['F002-005', 'Amtrium 1+2', 'CN Theater'] },
  { name: 'Lynda',   rooms: ['Elicium 1', 'Elicium 2'] },
];

const PREFILL = {
  'E103-105':    {setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'E106-108':    {setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'Auditorium':  {setup:1,ptz:1,stream:0,parsec:0,tested:0},
  'Hall 7A':     {setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'Hall 7B':     {setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'Hall 7C':     {setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'Hall 8D':     {setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'Hall 8E':     {setup:1,ptz:1,stream:1,parsec:1,tested:0},
  'Hall 8F':     {setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'Hall 8G':     {setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'Hall 12':     {setup:0,ptz:0,stream:0,parsec:0,tested:0},
  'Forum':       {setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'Hall 8G (co)':{setup:1,ptz:1,stream:1,parsec:1,tested:1},
  'Emerald':     {setup:1,ptz:0,stream:0,parsec:0,tested:0},
  'G102-105':    {setup:1,ptz:0,stream:0,parsec:0,tested:0},
  'F002-005':    {setup:1,ptz:0,stream:0,parsec:0,tested:0},
  'Amtrium 1+2': {setup:1,ptz:0,stream:0,parsec:0,tested:0},
  'CN Theater':  {setup:1,ptz:0,stream:0,parsec:0,tested:0},
  'Elicium 1':   {setup:1,ptz:0,stream:0,parsec:0,tested:0},
  'Elicium 2':   {setup:1,ptz:0,stream:0,parsec:0,tested:0},
};

let filterUser = null;

function getState() { try { return JSON.parse(localStorage.getItem('kc26')||'{}'); } catch { return {}; } }
function saveState(s) { localStorage.setItem('kc26', JSON.stringify(s)); }
function rk(crew,room) { return crew+'::'+room; }
function getVal(state,crew,room,step) {
  const k = rk(crew,room);
  if (state[k]?.[step] !== undefined) return state[k][step];
  return PREFILL[room]?.[step] || 0;
}
function isDone(state,crew,room) { return STEPS.every(s => getVal(state,crew,room,s.key)); }
function countDone(state,crew,room) { return STEPS.filter(s => getVal(state,crew,room,s.key)).length; }

function toggle(crew,room,step) {
  const state = getState();
  const k = rk(crew,room);
  if (!state[k]) { state[k]={}; STEPS.forEach(s => state[k][s.key]=getVal({},crew,room,s.key)); }
  state[k][step] = state[k][step] ? 0 : 1;
  saveState(state);
  render();
}

function toggleFilter(name) {
  filterUser = filterUser === name ? null : name;
  render();
}

function confirmReset() {
  if (confirm('Reset ALL rooms to empty?')) {
    localStorage.removeItem('kc26');
    showToast('Reset complete');
    render();
  }
}

function render() {
  const state = getState();
  const el = document.getElementById('tracker');
  el.innerHTML = '';

  // Filter chips
  const fr = document.getElementById('filterRow');
  fr.innerHTML = CREW.map(c => `
    <div class="filter-chip ${filterUser===c.name?'on':''}" onclick="toggleFilter('${c.name}')">
      <span class="dot"></span>${c.name}
    </div>`).join('');

  // Filter banner
  if (filterUser) {
    const b = document.createElement('div');
    b.className = 'filter-banner';
    b.innerHTML = `<span>Showing <strong>${filterUser}</strong> only</span>
      <span class="filter-banner-clear" onclick="toggleFilter('${filterUser}')">Show all</span>`;
    el.appendChild(b);
  }

  let totalRooms = 0, doneRooms = 0;

  CREW.forEach((c, ci) => {
    if (filterUser && filterUser !== c.name) return;

    const crewDone = c.rooms.filter(r => isDone(state, c.name, r)).length;
    totalRooms += c.rooms.length;
    doneRooms += crewDone;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-label">
      <span class="section-name">${c.name}</span>
      <span class="section-count">${crewDone}/${c.rooms.length}</span>
    </div>`;

    c.rooms.forEach(room => {
      const done = isDone(state, c.name, room);
      const n = countDone(state, c.name, room);
      const pct = Math.round(n / STEPS.length * 100);
      const statusClass = done ? 's-done' : n > 0 ? 's-wip' : 's-empty';
      const statusText  = done ? 'Done' : n > 0 ? `${n} / ${STEPS.length}` : 'Pending';

      const card = document.createElement('div');
      card.className = `card${done ? ' done' : ''}`;
      card.innerHTML = `
        <div class="card-header">
          <div class="card-name">${room}</div>
          <div class="card-status ${statusClass}">${statusText}</div>
        </div>
        <div class="step-row">
          ${STEPS.map(s => {
            const checked = getVal(state, c.name, room, s.key);
            const id = `${c.name}_${room}_${s.key}`.replace(/[\s()]/g,'_');
            return `<div class="step">
              <input type="checkbox" id="${id}" ${checked?'checked':''} onchange="toggle('${c.name}','${room}','${s.key}')">
              <label class="step-btn" for="${id}"><span class="step-icon">${s.icon}</span></label>
              <span class="step-label">${s.label}</span>
            </div>`;
          }).join('')}
        </div>
        <div class="card-track"><div class="card-track-fill" style="width:${pct}%"></div></div>`;
      sec.appendChild(card);
    });

    if (!filterUser && ci < CREW.length - 1) {
      const d = document.createElement('div');
      d.className = 'sep';
      sec.appendChild(d);
    }

    el.appendChild(sec);
  });

  // Ring progress
  const pct = totalRooms ? Math.round(doneRooms / totalRooms * 100) : 0;
  const circ = 2 * Math.PI * 18;
  document.getElementById('ringFill').style.strokeDashoffset = circ - (circ * pct / 100);
  document.getElementById('ringPct').textContent = pct + '%';
}

function copyStatus() {
  const state = getState();
  const lines = ['SET UP MASTER LIST:'];
  CREW.forEach(c => {
    c.rooms.forEach(room => {
      const checks = STEPS.filter(s => getVal(state,c.name,room,s.key)).map(s=>s.icon).join('');
      lines.push(`${room}-${c.name}${checks?' '+checks:''}`);
    });
  });
  lines.push('');
  lines.push('🔧 = set up  🤖 = Update PTZ');
  lines.push('🔑 = Stream keys  ⚡ = Parsec');
  lines.push('✏️ = Tested');

  navigator.clipboard.writeText(lines.join('\n'))
    .then(() => showToast('Copied to clipboard'))
    .catch(() => prompt('Copy:', lines.join('\n')));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

render();
</script>
</body>
</html>
